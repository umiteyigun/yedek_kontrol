version: 44
jobs:
- name: BuildAndPublishImages
  steps:
  - type: CheckoutStep
    name: checkout
    cloneCredential:
      type: DefaultCredential
    withLfs: false
    withSubmodules: false
    condition: SUCCESSFUL
    optional: false
  - type: CommandStep
    name: docker-login-registry
    runInContainer: true
    image: docker:cli
    interpreter:
      type: DefaultInterpreter
      commands: |
        echo "@secrets:registry-rw-token@" | docker login @server_url@ -u @job_token@ --password-stdin
    useTTY: true
    condition: SUCCESSFUL
    optional: false
  - type: BuildImageStep
    name: yedek-core
    buildPath: .
    dockerfile: core/Dockerfile
    output:
      type: RegistryOutput
      tags: git.trtek.tr/umiteyigun/yedek_kontrol/yedek-core:@build_number@
    condition: SUCCESSFUL
    optional: false
  - type: BuildImageStep
    name: yedek-central-agent
    buildPath: .
    dockerfile: agent/Dockerfile
    output:
      type: RegistryOutput
      tags: git.trtek.tr/umiteyigun/yedek_kontrol/yedek-central-agent:@build_number@
    condition: SUCCESSFUL
    optional: false
  - type: CommandStep
    name: release-manifest
    runInContainer: true
    image: alpine:3.20
    interpreter:
      type: DefaultInterpreter
      commands: |
        mkdir -p release
        cat > release/latest.env <<EOF
        RELEASE_TARGET_TAG=@build_number@
        RELEASE_CORE_IMAGE=git.trtek.tr/umiteyigun/yedek_kontrol/yedek-core
        RELEASE_AGENT_IMAGE=git.trtek.tr/umiteyigun/yedek_kontrol/yedek-central-agent
        EOF
        echo "release/latest.env hazir"
    useTTY: true
    condition: SUCCESSFUL
    optional: false
  - type: CommandStep
    name: publish-release-manifest-hub
    runInContainer: true
    image: alpine:3.20
    interpreter:
      type: DefaultInterpreter
      commands: |
        apk add --no-cache curl
        set -eu
        HUB_URL="${HUB_RELEASE_URL:-https://centos.trtekyazilim.com:8444}"
        echo "Hub publish: $HUB_URL tag=@build_number@"
        curl -fsS -X PUT "${HUB_URL}/api/v1/release/latest" \
          -H "Authorization: Bearer @secrets:hub-release-publish-token@" \
          -H "Content-Type: application/json" \
          -d "{\"tag\":\"@build_number@\"}"
        echo
        curl -fsS "${HUB_URL}/release/latest.env" | head -5
    useTTY: true
    condition: SUCCESSFUL
    optional: false
  - type: CommandStep
    name: publish-release-manifest
    runInContainer: true
    image: alpine:3.20
    interpreter:
      type: DefaultInterpreter
      commands: |
        # Eski kanal (OneDev public raw); login duvari varsa build kirmasin
        apk add --no-cache git curl || true
        set +e
        git config --global user.email "ci@@trtek.tr"
        git config --global user.name "OneDev CI"
        _host=$(echo "@server_url@" | sed 's|^https\?://||')
        git clone "https://@job_token@${_host}/yedek_kontrol_public.git" /tmp/public || {
          echo "public repo clone atlandi (opsiyonel)"
          exit 0
        }
        cd /tmp/public
        mkdir -p release
        cat > release/latest.env <<EOF
        RELEASE_TARGET_TAG=@build_number@
        RELEASE_CORE_IMAGE=git.trtek.tr/umiteyigun/yedek_kontrol/yedek-core
        RELEASE_AGENT_IMAGE=git.trtek.tr/umiteyigun/yedek_kontrol/yedek-central-agent
        EOF
        git add release/latest.env
        git diff --staged --quiet || git commit -m "release: image tag @build_number@"
        git push origin HEAD:main || echo "public push atlandi (opsiyonel)"
        exit 0
    useTTY: true
    condition: SUCCESSFUL
    optional: true
  triggers:
  - type: BranchUpdateTrigger
    branches: main
    userMatch: anyone
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 14400
- name: GitHubGonder
  steps:
  - type: PushRepository
    name: yedek_kontrol
    remoteUrl: https://github.com/umiteyigun/yedek_kontrol.git
    userName: umiteyigun
    passwordSecret: github-token
    force: true
    condition: SUCCESSFUL
    optional: false
  triggers:
  - type: BranchUpdateTrigger
    branches: main
    userMatch: anyone
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 14400
