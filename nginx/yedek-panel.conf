# Yedek panel — HTTPS reverse proxy (self-signed SSL)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream yedek_panel_backend {
    server 127.0.0.1:18090;
    keepalive 8;
}

# 8090: dis erisim -> HTTPS yonlendir; localhost API (yedek.sh) -> backend
server {
    listen 8090;
    server_name _;

    location /api/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://yedek_panel_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    location /health {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://yedek_panel_backend;
    }

    location / {
        return 301 https://$host:8443$request_uri;
    }
}

server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /yedek/ssl/panel.crt;
    ssl_certificate_key /yedek/ssl/panel.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 32m;

    location / {
        proxy_pass http://yedek_panel_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
