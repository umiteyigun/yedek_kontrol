<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Yedek Panel{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  {% if user %}
  <header class="topbar">
    <div class="brand">Yedek Yonetim Paneli</div>
    <nav>
      <a href="/">Durum</a>
      <a href="/ayarlar">Ayarlar</a>
      <a href="/logout" class="muted">Cikis</a>
    </nav>
  </header>
  {% endif %}

  <main class="container">
    {% if message %}
    <div class="alert success">{{ message }}</div>
    {% endif %}
    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
